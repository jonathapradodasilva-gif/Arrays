<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Banco de Funcionários</title>
</head>
<body>
  <h1>TREINO</h1>
  <section id="formulario">
    <form id="meuFormulario">
      <div class="txt">
        <label for="inome">Nome: <input type="text" name="nome" id="inome"></label>
        <label for="inasc">Nasc: <input type="date" name="nasc" id="inasc"></label>
        <input type="button" value="ADICIONAR" id="add" onclick="adicionar()" >
      </div>
      <div class="sexo">
        <label for="mas"><input type="radio" name="sex" value="masculino" id="mas">Masculino</label>
        <label for="fem"><input type="radio" name="sex" value="Feminino" id="fem">Feminino</label>
      </div>
    </form>
  </section>
  <section id="tabela">
    <table id="itable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Nasc</th>
          <th>Gênero</th>
        </tr>
      </thead>
      <tbody id="ibody">
        
      </tbody>
    </table>
  </section> 
</body>
<script>
  function adicionar(){
    let form = document.forms.meuFormulario;//NOVO => pega os elementos direto do formulário
    let nome = document.getElementById("inome").value;
    let nasc = document.getElementById("inasc").value;
    let sexo = form.sex.value;//NOVO => do formulario consigo pegar o radio selecionado

    const hj = new Date();

     /*coversão da data*/
    let data = new Date(nasc + 'T00:00:00');
    let diaNasc = data.toLocaleDateString('pt-BR');

    //==========VALIDADANDO OS VALORES====================//
    //nome//
    if(nome.length <= 0){
      nome = 'Sem nome';
    }
    //idade//
    if(nasc === "" ){
      diaNasc = 'Não Informado';
    }else if(data > hj){
      diaNasc = "Você"
    }
    //genero//
    if(sexo.length.value === "" ){
      sexo == "Selecione um sexo"
    }

   
    

    /*criando linha da table*/
    const linha = document.createElement('tr');//cria o elemento linha
    const columnNome = document.createElement('td');//cria a coluna do nome
    columnNome.textContent = nome;
    const columnIdade = document.createElement('td');//cria a coluna idade
    columnIdade.textContent = diaNasc;
    const columnGenero = document.createElement('td');//cria a coluna do genero
    columnGenero.textContent = sexo;

    /*adicionando as colunas na linha*/
    linha.appendChild(columnNome);
    linha.appendChild(columnIdade);
    linha.appendChild(columnGenero);
    document.getElementById('ibody').appendChild(linha);

  }
</script>
</html>
